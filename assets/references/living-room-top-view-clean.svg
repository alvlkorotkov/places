<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .page { fill: #fffdf6; }
      .room-fill { fill: #7a7a7a; }
      .wall { fill: none; stroke: #f2c235; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      .window { fill: none; stroke: #1f93f1; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      .door { fill: none; stroke: #ff4c1f; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      .counter { fill: none; stroke: #212121; stroke-width: 34; stroke-linecap: round; stroke-linejoin: round; }
      .column { fill: #f2c235; stroke: none; }
      .hint { fill: none; stroke: #dddddd; stroke-width: 34; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="page" width="1800" height="1200"/>

  <!-- room mass -->
  <path class="room-fill" d="M146 246 H1518 V378 H1690 V1058 H120 V246 Z"/>

  <!-- outer walls with right-side notch -->
  <path class="wall" d="M146 246 L1518 246 L1518 378 L1690 378 L1690 1058 L120 1058 L120 246 L146 246"/>

  <!-- columns -->
  <circle class="column" cx="430" cy="370" r="38"/>
  <circle class="column" cx="710" cy="370" r="38"/>
  <circle class="column" cx="990" cy="370" r="38"/>
  <circle class="column" cx="1235" cy="390" r="38"/>

  <!-- counter -->
  <path class="counter" d="M1235 290 L1235 390 L1465 390"/>

  <!-- side doors -->
  <path class="door" d="M120 520 L120 620"/>
  <path class="door" d="M1690 430 L1690 530"/>

  <!-- bottom windows and door -->
  <path class="window" d="M250 1058 L410 1058"/>
  <path class="window" d="M590 1058 L750 1058"/>
  <path class="window" d="M930 1058 L1090 1058"/>
  <path class="door" d="M1260 1058 L1410 1058"/>
  <path class="window" d="M1500 1058 L1660 1058"/>

  <!-- simple upper hint -->
  <path class="hint" d="M355 108 C310 162 288 196 240 254 C346 202 438 166 584 142 C486 206 438 242 430 246 C530 200 666 112 826 12 C774 122 782 152 856 134 C964 94 1018 66 1180 10 C1130 120 1140 150 1206 126 C1282 92 1340 72 1504 34 C1448 126 1452 148 1532 132 C1614 100 1676 62 1750 18"/>
</svg>
