<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .wall { fill: #bfc4bf; stroke: #2f3330; stroke-width: 4; }
      .inner { fill: #fafbf9; stroke: #383d39; stroke-width: 2; }
      .glass { fill: #dff7f4; stroke: #6eb9b5; stroke-width: 2; }
      .opening { fill: #ffffff; }
      .line { fill: none; stroke: #454b46; stroke-width: 2; }
      .soft { fill: #d7ddd8; stroke: #6b726c; stroke-width: 2; }
      .dark { fill: #2a2d31; opacity: 0.92; }
      .mirror { fill: #cfd5d9; opacity: 0.45; stroke: #798087; stroke-width: 2; }
      .column { fill: #c9ceca; stroke: #444a45; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="1000"/>

  <!-- outer walls -->
  <rect class="wall" x="170" y="150" width="820" height="520"/>
  <rect class="inner" x="192" y="172" width="776" height="476"/>

  <!-- openings on window wall -->
  <rect class="opening" x="250" y="648" width="110" height="22"/>
  <rect class="opening" x="438" y="648" width="110" height="22"/>
  <rect class="opening" x="780" y="648" width="64" height="22"/>

  <!-- windows / glazed door -->
  <rect class="glass" x="250" y="610" width="110" height="38"/>
  <rect class="glass" x="438" y="610" width="110" height="38"/>
  <rect class="glass" x="780" y="580" width="64" height="68"/>

  <!-- back wall doorway -->
  <rect class="opening" x="968" y="330" width="22" height="110"/>
  <path class="line" d="M968 330 A110 110 0 0 1 858 440"/>
  <path class="line" d="M990 440 A110 110 0 0 0 880 330"/>

  <!-- technical opening -->
  <rect class="opening" x="170" y="322" width="22" height="72"/>
  <path class="line" d="M192 322 A72 72 0 0 0 264 394"/>

  <!-- mirror/service block -->
  <rect class="mirror" x="192" y="248" width="348" height="198"/>
  <line class="line" x1="192" y1="446" x2="540" y2="446"/>

  <!-- dark zone -->
  <rect class="dark" x="776" y="172" width="192" height="476"/>

  <!-- main internal divider suggestion -->
  <line class="line" x1="776" y1="172" x2="776" y2="648" opacity="0.5"/>

  <!-- columns -->
  <rect class="column" x="322" y="214" width="28" height="28"/>
  <rect class="column" x="510" y="214" width="28" height="28"/>
  <rect class="column" x="698" y="214" width="28" height="28"/>
  <rect class="column" x="886" y="214" width="28" height="28"/>

  <!-- radiators -->
  <rect class="soft" x="256" y="578" width="98" height="18"/>
  <rect class="soft" x="444" y="578" width="98" height="18"/>

  <!-- duct axis hint -->
  <line class="line" x1="260" y1="332" x2="872" y2="332" opacity="0.25"/>
  <line class="line" x1="260" y1="364" x2="872" y2="364" opacity="0.18"/>
</svg>
